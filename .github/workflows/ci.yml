name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # Build verification is handled by Vercel's PR preview deployment,
      # which runs against real env vars. Running next build here would
      # fail because generateStaticParams and the root layout both make
      # live Sanity API calls that can't succeed with placeholder credentials.
